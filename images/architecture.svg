<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Agentic RAG AI Research Assistant — Architecture Diagram</title>
  <desc>Flowchart showing the full pipeline from user input through the Streamlit UI, agentic RAG pipeline, hybrid retrieval, tools, LLM, and response output.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- USER INPUT -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">User query</text>

  <!-- Arrow: User → UI -->
  <line x1="340" y1="64" x2="340" y2="92" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- STREAMLIT UI -->
  <rect x="200" y="94" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Streamlit UI</text>
  <text x="340" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">ui/app.py — chat, upload, history</text>

  <!-- Arrow: UI → Agent -->
  <line x1="340" y1="150" x2="340" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- AGENTIC RAG PIPELINE -->
  <rect x="180" y="180" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Agentic RAG pipeline</text>
  <text x="340" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">rag_pipeline/rag_agent.py — LangChain agent</text>

  <!-- Arrow: Pipeline → Retriever (left branch) -->
  <path d="M270 236 L270 278" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Arrow: Pipeline → Tools (right branch) -->
  <path d="M430 236 L430 278" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- HYBRID RETRIEVER -->
  <rect x="60" y="280" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Hybrid retriever</text>
  <text x="180" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">vector search + reranking</text>

  <!-- TOOLS -->
  <rect x="340" y="280" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="460" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#712B13">Agent tools</text>
  <text x="460" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">web search, SQL, calculator</text>

  <!-- Arrow: Retriever → FAISS -->
  <path d="M140 336 L100 368" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
  <!-- Arrow: Retriever → Reranker -->
  <path d="M220 336 L244 368" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- FAISS -->
  <rect x="44" y="370" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="104" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">FAISS</text>
  <text x="104" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">vector store</text>

  <!-- RERANKER -->
  <rect x="184" y="370" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="244" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Reranker</text>
  <text x="244" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">result scoring</text>

  <!-- Arrow: FAISS → Embeddings -->
  <path d="M104 414 L104 448" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- EMBEDDINGS -->
  <rect x="44" y="450" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="104" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Embeddings</text>
  <text x="104" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Ollama embeddings</text>

  <!-- Arrow: Embeddings → PDF Loader -->
  <path d="M104 494 L104 528" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- PDF LOADER -->
  <rect x="44" y="530" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="104" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">PDF loader</text>
  <text x="104" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">utils/pdf_loader.py</text>

  <!-- Arrow: Retriever → LLM -->
  <path d="M180 336 Q180 460 330 490" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Arrow: Tools → LLM -->
  <path d="M460 336 Q460 460 410 490" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="270" y="490" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="370" y="514" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#633806">Local LLM (Ollama)</text>
  <text x="370" y="534" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#854F0B">llama3.2:1b — fully local</text>

  <!-- Arrow: LLM → Response -->
  <line x1="370" y1="546" x2="370" y2="574" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RESPONSE -->
  <rect x="270" y="576" width="200" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="370" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Response to user</text>

</svg>
